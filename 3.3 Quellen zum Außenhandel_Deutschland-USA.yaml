- title: "Deutschlands Handelspartner im Vergleich"
  type: single
  question: |
    Ein Blick auf die Handelsbilanzdaten von 2025 zeigt die unterschiedlichen Rollen der USA und Chinas für die deutsche Wirtschaft. 
    
    Welche Aussage lässt sich anhand der Daten korrekt ableiten?
  answers:
    - "Da China wertmäßig unser größter Lieferant ist, ist die Volksrepublik automatisch auch der wichtigste Gesamthandelspartner (Summe aus Exporten und Importen) für Deutschland."
    - "Obwohl die USA der größte Abnehmer deutscher Waren (Exporte) sind, verzeichnet Deutschland im Handel mit den USA im Gegensatz zu China einen deutlichen Exportüberschuss."
    - "Die Niederlande sind für die deutsche Exportwirtschaft von weitaus größerer Bedeutung als für die Importseite."
    - "Aufgrund der amerikanischen Einfuhrhemmnisse ist der Gesamtwert der exportierten Waren in die USA im Jahr 2025 bereits unter den Wert der Importe aus den USA gefallen."
  correct: B


- title: "Resistenz von Exportgütern"
  type: single
  question: |
    Wenn man die Entwicklung der deutschen Exporte in die USA von 2024 auf 2025 betrachtet, fällt auf, dass fast alle großen Warengruppen (Kraftwagen, Maschinen, Chemie) wertmäßig geschrumpft sind – mit einer markanten Ausnahme: den pharmazeutischen Erzeugnissen. 
    
    Welcher ökonomische Grund erklärt am ehesten, warum Pharmazeutika trotz drohender oder bestehender Handelshemmnisse resistent gegen diesen Abwärtstrend waren?
  answers:
    - "Die Nachfrage nach medizinischen Gütern und Medikamenten ist weitgehend unelastisch; US-Abnehmer können kurzfristig nicht auf diese Importe verzichten, selbst wenn sie sich verteuern."
    - "Pharmazeutische Produkte lassen sich im Gegensatz zu Kraftwagen oder Maschinen viel kostengünstiger per Schiff transportieren, wodurch Zölle kaum ins Gewicht fallen."
    - "Die USA haben für Medikamente sofortige Gegenzölle auf amerikanische Exporte verhängt, was den Handel künstlich stabilisierte."
    - "Deutsche Pharmaunternehmen haben ihre Produktion im Jahr 2025 komplett in die USA verlegt, um den Außenhandelwert in der Statistik zu pushen."
  correct: A


- title: "Lasten von Handelshemmnissen"
  type: single
  question: |
    Das US-Diagramm zeigt für Juni 2025 einen schnellen Inflationsanstieg, insbesondere bei importnahen Kategorien wie „Kraftstoffe“ (+3,6 Prozentpunkte) oder „Geräte“ (+1,1 Prozentpunkte). 
    
    Wer trägt ökonomisch betrachtet kurzfristig die Hauptlast dieser Entwicklung?
  answers:
    - "Die deutschen Exporteure, da sie die amerikanischen Zölle direkt an den US-Zoll bezahlen müssen und dadurch ihre Gewinnmarge in Deutschland sinkt."
    - "Der amerikanische Staat, da er die heimische Wirtschaft durch Subventionen vor der Inflation schützen muss und sich dadurch oversverschuldet."
    - "Die amerikanischen Verbraucher und Unternehmen, da Importeure die gestiegenen Zoll- und Beschaffungskosten über höhere Preise an den Binnenmarkt weitergeben."
    - "Die europäische Zentralbank, da der starke Preisanstieg in den USA den Euro-Wechselkurs massiv abwertet."
  correct: C
 

- question: |
    Betrachten man das Diagramm zur Entwicklung des deutschen Außenhandels im Dreijahresvergleich, lässt sich eine charakteristische Dynamik bei den Exporten und Importen beobachten.
    Welche Aussage beschreibt die dort dargestellte Entwicklung der Handelsbilanz im Februar 2026 im Vergleich zu den Vorjahren korrekt?
  type: single
  answers:
    - "Die Schere zwischen Ausfuhren und Einfuhren schließt sich vollständig, da die Importe im Februar 2026 sprunghaft angestiegen sind."
    - "Der Exportüberschuss hat sich seit 2024 verringert, da die Importe stärker zulegten als die Exporte."
    - "Sowohl die Exporte als auch die Importe sind seit Februar 2024 kontinuierlich in jedem Jahr schrittweise zurückgegangen."
    - "Die Handelsbilanz bricht im Februar 2026 ein, da der Wert der Importe erstmals den Wert der Exporte deutlich übersteigt."
  correct: B
  explanation: "Zur Beantwortung sollte das Diagramm 'Deutschlands Außenhandel (in Milliarden Euro) für die Monate Februar 2024 und 2026' genutzt werden. Es zeigt, dass die Exporte von 131,1 (2025) auf 135,2 (2026) steigen, während die Importe im selben Zeitraum nur von 109,3 auf 115,4 anstiegen."


- question: |
    Das Liniendiagramm zeigt die langfristige Entwicklung der wichtigsten deutschen Handelspartner (Summe aus Im- und Exporten) seit dem Jahr 2015.
    Welcher fundamentale Strukturwandel im deutschen Außenhandel lässt sich aus dem Kurvenverlauf zwischen den Jahren 2024 und 2025 ablesen?
  type: single
  answers:
    - "Der Außenhandel mit Polen ist auf einem konstant niedrigen Niveau. Polen ist daher ein unwichtiger Handelspartner für Deutschland."
    - "Die Niederlande bleiben konstant an dritter Position der wichtigsten Handelspartner Deutschlands."
    - "Alle europäischen Nachbarstaaten verzeichnen ab dem Jahr 2024 einen identischen, steilen Wachstumstrend nach oben."
    - "Die USA verlieren erneut ihre Spitzenposition im Gesamthandelsvolumen und werden im Jahr 2025 von China überholt."
  correct: D
  explanation: "Zur Beantwortung sollte das Liniendiagramm 'Deutschlands wichtigste Handelspartner: Entwicklung der Summe von Warenimporten und -exporten seit 2015' genutzt werden. Es zeigt den Schnittpunkt im Jahr 2025, bei dem die rote Linie (China) die schwarze Linie (USA) kreuzt."
